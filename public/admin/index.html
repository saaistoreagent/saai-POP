<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>트렌드 상품 관리</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #222; }
    .container { max-width: 900px; margin: 0 auto; padding: 32px 20px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 24px; }
    h2 { font-size: 14px; font-weight: 700; color: #555; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* 폼 */
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 24px; border: 1px solid #e5e5e5; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 12px; font-weight: 600; color: #666; }
    input, select { padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    input:focus, select:focus { border-color: #6366f1; }
    .checkbox-row { display: flex; align-items: center; gap-8px; }
    .checkbox-row input { width: 16px; height: 16px; }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover { background: #fecaca; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .actions { display: flex; justify-content: flex-end; margin-top: 16px; }

    /* 테이블 */
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 10px 12px; font-size: 12px; font-weight: 600; color: #888; border-bottom: 1px solid #eee; }
    td { padding: 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .badge-주류 { background: #dbeafe; color: #1d4ed8; }
    .badge-음료 { background: #dcfce7; color: #15803d; }
    .badge-스낵 { background: #fef9c3; color: #a16207; }
    .badge-디저트 { background: #fce7f3; color: #be185d; }
    .badge-즉석식품 { background: #ffedd5; color: #c2410c; }
    .badge-라면 { background: #ffedd5; color: #c2410c; }
    .badge-도시락 { background: #f0fdf4; color: #166534; }
    .badge-삼각김밥 { background: #ecfdf5; color: #065f46; }
    .toggle { width: 36px; height: 20px; border-radius: 99px; border: none; cursor: pointer; position: relative; transition: background 0.2s; }
    .toggle.on { background: #6366f1; }
    .toggle.off { background: #d1d5db; }
    .toggle::after { content: ''; position: absolute; top: 3px; width: 14px; height: 14px; background: white; border-radius: 50%; transition: left 0.2s; }
    .toggle.on::after { left: 19px; }
    .toggle.off::after { left: 3px; }
    img.thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; background: #f3f4f6; }
    .no-img { width: 40px; height: 40px; background: #f3f4f6; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .empty { text-align: center; color: #aaa; padding: 40px; font-size: 14px; }

    /* 수정 모달 */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 16px; padding: 24px; width: 480px; max-width: 90vw; }
    .modal h2 { margin-bottom: 16px; font-size: 16px; }
    .modal .actions { gap: 8px; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-secondary:hover { background: #e5e7eb; }
  </style>
</head>
<body>
<div class="container">
  <h1>📦 트렌드 상품 관리</h1>

  <!-- 추가 폼 -->
  <div class="card">
    <h2>상품 추가</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>상품명 *</label>
        <input id="f-name" placeholder="예: 두바이 초콜릿" />
      </div>
      <div class="form-group">
        <label>카테고리 *</label>
        <select id="f-category">
          <option value="">선택</option>
          <option value="주류">주류</option>
          <option value="음료">음료</option>
          <option value="스낵">스낵</option>
          <option value="디저트">디저트</option>
          <option value="즉석식품">즉석식품</option>
          <option value="라면">라면</option>
          <option value="도시락">도시락</option>
          <option value="삼각김밥">삼각김밥</option>
        </select>
      </div>
      <div class="form-group">
        <label>브랜드 *</label>
        <input id="f-brand" placeholder="예: 픽스 디저트" />
      </div>
      <div class="form-group">
        <label>이미지 URL</label>
        <input id="f-imageUrl" placeholder="https://..." />
      </div>
      <div class="form-group">
        <label>뉴스레터 호수</label>
        <input id="f-issue" type="number" min="1" placeholder="예: 1" />
      </div>
      <div class="form-group full">
        <label>상품 설명 <span style="color:#aaa;font-weight:400;">(LLM 참고용 — 유저에게 미노출)</span></label>
        <textarea id="f-description" rows="3" placeholder="예: 크라운 콘피쵸는 크림 샌드 사이에 초콜릿 코팅 콘플레이크를 넣은 과자로, 바삭함과 달콤함이 특징. 편의점 한정 리뉴얼 출시." style="padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;resize:vertical;font-family:inherit;"></textarea>
      </div>
      <div class="form-group" style="flex-direction:row; align-items:center; gap:8px;">
        <input type="checkbox" id="f-active" checked />
        <label for="f-active" style="cursor:pointer;">바로 활성화</label>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="addProduct()">추가하기</button>
    </div>
  </div>

  <!-- 목록 -->
  <div class="card">
    <h2>상품 목록</h2>
    <table>
      <thead>
        <tr>
          <th>이미지</th>
          <th>상품명</th>
          <th>카테고리</th>
          <th>브랜드</th>
          <th>호수</th>
          <th>활성화</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="product-list"><tr><td colspan="7" class="empty">불러오는 중...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- 수정 모달 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>상품 수정</h2>
    <input type="hidden" id="m-id" />
    <div class="form-grid">
      <div class="form-group">
        <label>상품명 *</label>
        <input id="m-name" />
      </div>
      <div class="form-group">
        <label>카테고리 *</label>
        <select id="m-category">
          <option value="주류">주류</option>
          <option value="음료">음료</option>
          <option value="스낵">스낵</option>
          <option value="디저트">디저트</option>
          <option value="즉석식품">즉석식품</option>
          <option value="라면">라면</option>
          <option value="도시락">도시락</option>
          <option value="삼각김밥">삼각김밥</option>
        </select>
      </div>
      <div class="form-group full">
        <label>브랜드 *</label>
        <input id="m-brand" />
      </div>
      <div class="form-group full">
        <label>이미지 URL</label>
        <input id="m-imageUrl" />
      </div>
      <div class="form-group">
        <label>뉴스레터 호수</label>
        <input id="m-issue" type="number" min="1" placeholder="예: 1" />
      </div>
      <div class="form-group full">
        <label>상품 설명 <span style="color:#aaa;font-weight:400;">(LLM 참고용 — 유저에게 미노출)</span></label>
        <textarea id="m-description" rows="3" style="padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;resize:vertical;font-family:inherit;"></textarea>
      </div>
      <div class="form-group" style="flex-direction:row; align-items:center; gap:8px;">
        <input type="checkbox" id="m-active" />
        <label for="m-active" style="cursor:pointer;">활성화</label>
      </div>
    </div>
    <div class="actions" style="gap:8px;">
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<script>
  const API = '/api/trend/products';
  let productMap = {};

  async function load() {
    const res = await fetch(API + '/all');
    const products = await res.json();
    productMap = {};
    products.forEach(p => productMap[p.id] = p);
    const tbody = document.getElementById('product-list');
    if (!products.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">등록된 상품이 없어요</td></tr>';
      return;
    }
    tbody.innerHTML = products.map(p => `
      <tr>
        <td>${p.imageUrl ? `<img class="thumb" src="${p.imageUrl}" onerror="this.style.display='none'" />` : `<div class="no-img">📦</div>`}</td>
        <td><strong>${p.name}</strong></td>
        <td><span class="badge badge-${p.category}">${p.category}</span></td>
        <td>${p.brand}</td>
        <td style="color:#6366f1;font-weight:600;font-size:13px;">${p.newsletterIssue ? p.newsletterIssue + '호' : '—'}</td>
        <td><button class="toggle ${p.active ? 'on' : 'off'}" onclick="toggleActive(${p.id}, ${p.active})"></button></td>
        <td style="display:flex;gap:6px;">
          <button class="btn btn-sm btn-secondary" onclick="openEdit(${p.id})">수정</button>
          <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">삭제</button>
        </td>
      </tr>
    `).join('');
  }

  async function addProduct() {
    const name = document.getElementById('f-name').value.trim();
    const category = document.getElementById('f-category').value;
    const brand = document.getElementById('f-brand').value.trim();
    const imageUrl = document.getElementById('f-imageUrl').value.trim();
    const active = document.getElementById('f-active').checked;
    const issueVal = document.getElementById('f-issue').value.trim();
    const newsletterIssue = issueVal ? parseInt(issueVal) : null;
    const description = document.getElementById('f-description').value.trim() || null;
    if (!name || !category || !brand) return alert('상품명, 카테고리, 브랜드를 입력해주세요.');
    await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, category, brand, imageUrl, active, newsletterIssue, description }) });
    document.getElementById('f-name').value = '';
    document.getElementById('f-category').value = '';
    document.getElementById('f-brand').value = '';
    document.getElementById('f-imageUrl').value = '';
    document.getElementById('f-issue').value = '';
    document.getElementById('f-description').value = '';
    document.getElementById('f-active').checked = true;
    load();
  }

  async function toggleActive(id, current) {
    const product = await fetch(API + '/all').then(r => r.json()).then(arr => arr.find(p => p.id === id));
    await fetch(`${API}/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...product, active: !current }) });
    load();
  }

  async function deleteProduct(id) {
    if (!confirm('정말 삭제할까요?')) return;
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    load();
  }

  function openEdit(id) {
    const p = productMap[id];
    if (!p) return;
    document.getElementById('m-id').value = p.id;
    document.getElementById('m-name').value = p.name;
    document.getElementById('m-category').value = p.category;
    document.getElementById('m-brand').value = p.brand;
    document.getElementById('m-imageUrl').value = p.imageUrl ?? '';
    document.getElementById('m-issue').value = p.newsletterIssue ?? '';
    document.getElementById('m-description').value = p.description ?? '';
    document.getElementById('m-active').checked = !!p.active;
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  async function saveEdit() {
    const id = document.getElementById('m-id').value;
    const mIssue = document.getElementById('m-issue').value.trim();
    const body = {
      name: document.getElementById('m-name').value.trim(),
      category: document.getElementById('m-category').value,
      brand: document.getElementById('m-brand').value.trim(),
      imageUrl: document.getElementById('m-imageUrl').value.trim(),
      newsletterIssue: mIssue ? parseInt(mIssue) : null,
      description: document.getElementById('m-description').value.trim() || null,
      active: document.getElementById('m-active').checked,
    };
    await fetch(`${API}/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    closeModal();
    load();
  }

  document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

  load();
</script>
</body>
</html>
